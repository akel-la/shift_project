services:

  db:
    container_name: shift_db
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - shift_prod_network
    volumes:
      - shift_postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Двойной $$ вместо одинарного $, чтобы подстановка значений была именно
      # внутри контейнера, а не брались значения из текущего окружения:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      start_period: 3s
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    container_name: shift_app
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ENVIRONMENT=prod
      - POSTGRES_HOST=db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shift_prod_network

volumes:
  postgres_data:

networks:
  shift_prod_network:
    driver: bridge
